# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Test
      run: dotnet test --no-build -c Release --verbosity normal
    
    - name: Publish MagazineCrawler (Windows single-file exe)
      run: dotnet publish ./MagazineCrawler -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./artifacts/MagazineCrawler-win-x64

    - name: Upload MagazineCrawler artifact
      uses: actions/upload-artifact@v4
      with:
        name: MagazineCrawler-${{ github.run_number }}
        path: ./artifacts/Magazinerawler-win-x64
        if-no-files-found: error
